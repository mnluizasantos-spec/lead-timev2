[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # SENHA_OP nunca está no código — está só nas env vars do Netlify.
  # Mas se o scanner achar algum falso positivo, omitimos pra não quebrar.
  SECRETS_SCAN_OMIT_KEYS = "SENHA_OP"

[functions]
  node_bundler = "esbuild"

# Cabeçalhos pra evitar cache do dados.json (queremos sempre fresh)
[[headers]]
  for = "/*.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
